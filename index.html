<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaucasHub — Caucasus Freight Exchange</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

  .header {
    background: #1a1a2e;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 54px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .logo { color: #fff; font-size: 21px; font-weight: 900; letter-spacing: -0.5px; }
  .logo span { color: #f7b731; }
  .logo-sub { font-size: 10px; color: #888; letter-spacing: 1px; font-weight: 400; margin-left: 2px; vertical-align: middle; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .btn-login { background: transparent; color: #ccc; border: 1px solid #444; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .btn-register { background: #f7b731; color: #1a1a2e; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .lang-switch { display: flex; gap: 2px; }
  .lang-btn { background: transparent; border: 1px solid #333; color: #888; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .lang-btn.active { background: #f7b731; color: #1a1a2e; border-color: #f7b731; font-weight: 700; }

  /* SCOPE TABS */
  .scope-bar {
    background: #16213e;
    display: flex;
    padding: 0 16px;
    gap: 0;
    border-bottom: 1px solid #0d1526;
  }
  .scope-tab {
    padding: 10px 20px;
    font-size: 13px;
    color: #888;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-weight: 500;
  }
  .scope-tab.active { color: #f7b731; border-bottom-color: #f7b731; }

  /* NAV TABS */
  .nav-tabs {
    background: #1a1a2e;
    display: flex;
    padding: 0 16px;
    border-bottom: 1px solid #111;
  }
  .nav-tab { padding: 9px 14px; color: #666; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .nav-tab.active { color: #f7b731; border-bottom-color: #f7b731; font-weight: 600; }

  /* STATS */
  .stats-bar { background: #0d1526; padding: 7px 16px; display: flex; gap: 20px; font-size: 11px; color: #666; }
  .stat { display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .stat strong { color: #aaa; }

  /* FILTERS */
  .filters {
    background: #fff;
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid #eee;
    position: sticky; top: 54px; z-index: 98;
    box-shadow: 0 2px 4px rgba(0,0,0,.06);
  }
  .fsel {
    border: 1.5px solid #e0e0e0; border-radius: 8px;
    padding: 7px 10px; font-size: 13px; color: #333;
    background: #fff; cursor: pointer; outline: none;
  }
  .fsel:focus { border-color: #f7b731; }
  .fbtn { background: #1a1a2e; color: #fff; border: none; padding: 7px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .fcount { background: #f7b731; color: #1a1a2e; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; margin-left: auto; }

  /* TABLE HEADER */
  .thead {
    display: grid;
    grid-template-columns: 2.2fr 1.8fr 1fr 1.2fr 1fr 1fr 85px;
    padding: 8px 16px;
    background: #e8eaf0;
    font-size: 10px; color: #777; font-weight: 700;
    text-transform: uppercase; letter-spacing: .6px;
    border-bottom: 1px solid #d0d4df;
  }

  /* ROW */
  .row {
    display: grid;
    grid-template-columns: 2.2fr 1.8fr 1fr 1.2fr 1fr 1fr 85px;
    padding: 11px 16px;
    background: #fff;
    border-bottom: 1px solid #f2f2f2;
    cursor: pointer;
    align-items: center;
    transition: background .12s;
    border-left: 3px solid transparent;
  }
  .row:hover { background: #fffbf0; }
  .row.urgent { border-left-color: #e74c3c; }
  .row.fresh  { border-left-color: #2ecc71; }
  .row.intl   { border-left-color: #3498db; }

  .route { font-weight: 700; font-size: 14px; }
  .arrow { color: #f7b731; margin: 0 3px; }
  .sub   { font-size: 11px; color: #999; margin-top: 2px; }
  .stars { color: #f7b731; font-size: 10px; }

  .tag {
    display: inline-block; font-size: 11px;
    padding: 2px 8px; border-radius: 4px;
    font-weight: 600; background: #f0f2f5; color: #555;
  }
  .tag-ref    { background: #e3f2fd; color: #1565c0; }
  .tag-tent   { background: #f3e5f5; color: #6a1b9a; }
  .tag-bort   { background: #e8f5e9; color: #2e7d32; }
  .tag-termos { background: #fff3e0; color: #bf360c; }
  .tag-gazel  { background: #fce4ec; color: #880e4f; }

  .price { font-size: 15px; font-weight: 900; }
  .date-today { color: #2ecc71; font-weight: 700; font-size: 12px; }
  .date-tom   { color: #f7b731; font-weight: 600; font-size: 12px; }
  .date-norm  { color: #777; font-size: 12px; }

  .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 700; display: inline-block; margin-top: 2px; }
  .badge-new    { background: #2ecc71; color: #fff; }
  .badge-urgent { background: #e74c3c; color: #fff; }
  .badge-intl   { background: #3498db; color: #fff; }

  .btn-resp { background: #f7b731; color: #1a1a2e; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }

  .load-more { text-align: center; padding: 16px; background: #fff; }
  .load-more button { background: #f0f2f5; border: none; padding: 10px 24px; border-radius: 8px; font-size: 13px; color: #555; cursor: pointer; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: flex-end; justify-content: center; }
  .overlay.on { display: flex; }
  .modal {
    background: #fff; width: 100%; max-width: 560px;
    border-radius: 16px 16px 0 0; padding: 20px;
    max-height: 90vh; overflow-y: auto;
    animation: up .25s ease;
    position: relative;
  }
  @keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 14px; }
  .m-title { font-size: 19px; font-weight: 900; margin-bottom: 2px; }
  .m-sub   { font-size: 12px; color: #999; margin-bottom: 14px; }
  .m-company { display: flex; align-items: center; gap: 10px; background: #f8f9fa; border-radius: 10px; padding: 11px; margin-bottom: 14px; }
  .avatar { width: 42px; height: 42px; background: #1a1a2e; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #f7b731; font-weight: 900; font-size: 14px; flex-shrink: 0; }
  .m-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .mf label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 2px; }
  .mf value { font-size: 14px; font-weight: 700; color: #1a1a2e; }
  .divider { height: 1px; background: #f0f0f0; margin: 12px 0; }
  .m-price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .m-price { font-size: 28px; font-weight: 900; }
  .m-actions { display: flex; gap: 10px; }
  .btn-main { flex: 1; background: #f7b731; color: #1a1a2e; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 800; cursor: pointer; }
  .btn-call { background: #f0f2f5; border: none; padding: 14px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 54px; }
  .close-btn { position: absolute; top: 16px; right: 16px; background: #f0f2f5; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; }

  /* BOTTOM NAV */
  .bnav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; padding: 8px 0; z-index: 100; }
  .bitem { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; color: #555; font-size: 10px; cursor: pointer; padding: 3px 0; }
  .bitem.active { color: #f7b731; }
  .bicon { font-size: 20px; }
  .fab { display: none; position: fixed; bottom: 68px; right: 16px; background: #f7b731; color: #1a1a2e; border: none; width: 52px; height: 52px; border-radius: 50%; font-size: 26px; cursor: pointer; box-shadow: 0 4px 16px rgba(247,183,49,.5); z-index: 99; align-items: center; justify-content: center; }

  @media(max-width:640px) {
    .thead { display: none; }
    .row { display: block; padding: 12px 16px; }
    .row > *:not(:first-child) { display: none; }
    .row .mob-sub { display: flex !important; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
    .bnav { display: flex; }
    .fab { display: flex; }
    .cargo-list { padding-bottom: 64px; }
    .fsel { font-size: 12px; padding: 6px 8px; }
    .lang-btn { padding: 3px 6px; font-size: 10px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <span class="logo">Caucas<span>Hub</span></span>
    <span class="logo-sub">.ge</span>
  </div>

      <button class="lang-btn active" onclick="setLang('ru',this)">RU</button>
      <button class="lang-btn" onclick="setLang('ge',this)">GE</button>
      <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    </div>
    <button class="btn-login" id="btnLogin">Войти</button>
    <button class="btn-register" id="btnReg">Регистрация</button>

</div>

<!-- SCOPE TABS -->

</div>

<!-- CARGO LIST -->

<!-- MODAL -->

// ── STATE ────────────────────────────────────────────────────
let lang = 'ru';
let scope = 'local';

// ── RENDER LIST ──────────────────────────────────────────────
function renderList() {
  const data = scope === 'local' ? LOCAL : INTL;
  const t = T[lang];
  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(d => {
    const row = document.createElement('div');
    row.className = 'row' + (d.badge==='urgent'?' urgent':d.badge==='new'?' fresh':d.scope==='intl'?' intl':'');
    row.onclick = () => openModal(d);

    const dateClass = d.date==='today'?'date-today':d.date==='tomorrow'?'date-tom':'date-norm';
    const dateText = d.date==='today'?t.today:d.date==='tomorrow'?t.tomorrow:d.date;
    const badgeHtml = d.badge==='new'?`<span class="badge badge-new">NEW</span>`:d.badge==='urgent'?`<span class="badge badge-urgent">${lang==='ge'?'სასწრაფო':'СРОЧНО'}</span>`:'';
    const intlBadge = d.scope==='intl' && scope==='intl' ? `<span class="badge badge-intl">${lang==='en'?'INTL':lang==='ge'?'საერთ.':'МЕЖД.'}</span>` : '';

    row.innerHTML = `
      <div>
        <div class="route">${d.from} <span class="arrow">→</span> ${d.to}</div>
        <div class="sub">${d.co} &nbsp;<span class="stars">★</span> ${d.rat}</div>
        <div class="mob-sub" style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
          <span class="tag tag-${d.type}">${d.tag}</span>
          <span style="font-size:11px;color:#888">${d.kg}</span>
          ${badgeHtml}${intlBadge}
        </div>
      </div>
      <div><div style="font-size:13px;font-weight:600">${d.co}</div><div class="sub"><span class="stars">★</span> ${d.rat} · ${d.trips} ${lang==='en'?'trips':lang==='ge'?'მოგზ.':'рейсов'}</div></div>
      <div style="font-size:13px;color:#333">${d.kg}</div>
      <div><span class="tag tag-${d.type}">${d.tag}</span></div>
      <div><div class="price">${d.price}</div></div>
      <div><div class="${dateClass}">${dateText}</div>${badgeHtml}${intlBadge}</div>
      <div><button class="btn-resp">${lang==='en'?'Apply':lang==='ge'?'გამოხმ.':'Откликнуться'}</button></div>
    `;
    list.appendChild(row);
  });

  // Load more
  const lm = document.createElement('div');
  lm.className = 'load-more';
  const more = scope==='local' ? (lang==='en'?'Load 181 more':'Загрузить ещё 181 груз ↓') : (lang==='en'?'Load 94 more':'Загрузить ещё 94 груза ↓');
  lm.innerHTML = `<button>${more}</button>`;
  list.appendChild(lm);
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(d) {
  const t = T[lang];
  document.getElementById('mTitle').textContent = `${d.from.split('/')[1]||d.from} → ${d.to}`;
  document.getElementById('mSub').textContent = `#${d.scope.toUpperCase()}-${String(d.id).padStart(5,'0')} · ${d.co}`;
  document.getElementById('mAva').textContent = d.ava;
  document.getElementById('mComp').textContent = d.co;
  document.getElementById('mStats').textContent = `★ ${d.rat} · ${d.trips} рейсов`;
  document.getElementById('mFrom').textContent = d.from2;
  document.getElementById('mTo').textContent = d.to2;
  document.getElementById('mDate').textContent = d.dt;
  document.getElementById('mWeight').textContent = d.kg;
  document.getElementById('mType').textContent = d.tag;
  document.getElementById('mPay').textContent = d.pay;
  document.getElementById('mDesc').textContent = d.desc;
  document.getElementById('mPrice').textContent = d.price;
  document.getElementById('mKm').textContent = d.km;
  document.getElementById('mPkm').textContent = d.pkm;
  // labels
  document.getElementById('lFrom').textContent = t.lFrom;
  document.getElementById('lTo').textContent = t.lTo;
  document.getElementById('lDate').textContent = t.lDate;
  document.getElementById('lWeight').textContent = t.lWeight;
  document.getElementById('lType').textContent = t.lType;
  document.getElementById('lPay').textContent = t.lPay;
  document.getElementById('lDesc').textContent = t.lDesc;
  document.getElementById('lRate').textContent = t.lRate;
  document.getElementById('lDist').textContent = t.lDist;
  document.getElementById('btnRespond').textContent = t.btnRespond;
  document.getElementById('overlay').classList.add('on');
}

function closeOverlay(e) { if(e.target===document.getElementById('overlay')) closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('on'); }

// ── LANGUAGE ─────────────────────────────────────────────────
function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyLang();
  renderList();
}

function applyLang() {
  const t = T[lang];
  document.getElementById('btnLogin').textContent = t.login;
  document.getElementById('btnReg').textContent = t.reg;
  document.getElementById('sLocal').textContent = t.sLocal;
  document.getElementById('sIntl').textContent = t.sIntl;
  document.getElementById('btnSearch').textContent = t.fBtn;
  document.getElementById('bnCargo').textContent = t.bnCargo;
  document.getElementById('bnTruck').textContent = t.bnTruck;
  document.getElementById('bnOrders').textContent = t.bnOrders;
  document.getElementById('bnChat').textContent = t.bnChat;
  document.getElementById('bnProfile').textContent = t.bnProfile;
  document.getElementById('fcount').textContent = (scope==='local'?'187':'96') + ' ' + t.statCargo;
}

// ── SCOPE ─────────────────────────────────────────────────────
function setScope(s, el) {
  scope = s;
  document.querySelectorAll('.scope-tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  const t = T[lang];
  if(s==='local') {
    document.getElementById('statCargo').textContent = '187';
    document.getElementById('statTrucks').textContent = '634';
    document.getElementById('fcount').textContent = '187 ' + t.statCargo;
  } else {
    document.getElementById('statCargo').textContent = '96';
    document.getElementById('statTrucks').textContent = '413';
    document.getElementById('fcount').textContent = '96 ' + t.statCargo;
  }
  renderList();
}

// ── INIT ──────────────────────────────────────────────────────
renderList();
</script>
